<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Login</title>
    <style>
      /* RESET */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      /* BACKGROUND WITH ANIMATION */
      body {
        height: 100vh;
        overflow: hidden;
      }

      .background {
        position: fixed;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #00e1ff, #0078ff, #00ffc6);
        background-size: 300% 300%;
        animation: bgMove 12s infinite alternate ease-in-out;
        filter: blur(3px);
      }

      @keyframes bgMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* LOGIN CARD (GLASS EFFECT) */
      .login-card {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 380px;
        padding: 80px 45px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        backdrop-filter: blur(20px);
        border: 1px solid white;
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.2);
        animation: slideDown 0.8s ease forwards;
        opacity: 0;
      }
      .login-card:hover {
        box-shadow: 0 0 45px rgba(0, 0, 0, 0.2);
        transition: all 0.5s;
      }

      /* SLIDE-IN ANIMATION */
      @keyframes slideDown {
        0% {
          transform: translate(-50%, -60%);
          opacity: 0;
        }
        100% {
          transform: translate(-50%, -50%);
          opacity: 1;
        }
      }

      .title {
        text-align: center;
        color: #fff;
        font-size: 28px;
        margin-bottom: 20px;
        font-weight: 600;
      }

      /* INPUT ANIMATION */
      input {
        width: 100%;
        padding: 12px 15px;
        margin: 10px 0;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(255, 255, 255, 0.85);
        font-size: 15px;
        transition: 0.3s;
      }

      input:focus {
        transform: scale(1.03);
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.25);
      }

      /* BUTTONS */
      .btn {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        margin-top: 12px;
        transition: 0.4s ease;
        font-weight: 600;
      }

      /* USER LOGIN BUTTON */
      .login-btn {
        background: #ffffff;
        color: #0078ff;
      }

      .login-btn:hover {
        background: #0078ff;
        color: white;
        transform: translateY(-3px);
      }

      /* ADMIN BUTTON */
      .admin-btn {
        background: #ff006e;
        color: white;
      }

      .admin-btn:hover {
        background: #c20054;
        transform: translateY(-3px);
      }

      /* MOBILE RESPONSIVE DESIGN */
      @media (max-width: 480px) {
        .login-card {
          width: 90%;
          padding: 25px;
        }

        .title {
          font-size: 24px;
        }

        input {
          font-size: 14px;
        }

        .btn {
          font-size: 15px;
        }
      }

      /* TABLET RESPONSIVE */
      @media (max-width: 768px) {
        .login-card {
          width: 70%;
        }
      }
      .error {
        color: red;
        font-size: 13px;
        margin-top: -5px;
        margin-bottom: 5px;
        display: none;
      }

      input.error-border {
        border: 2px solid red !important;
      }
      /* FLOATING ADMIN BUTTON (BOTTOM RIGHT) */
      .admin-floating-btn {
        position: fixed;
        bottom: 25px;
        right: 25px;
        background: #ff006e;
        color: white;
        padding: 12px 22px;
        border: none;
        border-radius: 50px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.25);
        transition: 0.3s ease;
        z-index: 999;
      }

      /* Hover effect */
      .admin-floating-btn:hover {
        background: #c20054;
        transform: translateY(-3px);
      }

      /* MOBILE RESPONSIVE */
      @media (max-width: 480px) {
        .admin-floating-btn {
          bottom: 15px;
          right: 15px;
          padding: 10px 18px;
          font-size: 14px;
        }
      }
    </style>
  </head>

  <body>
    <div class="background"></div>

    <div class="login-card">
      <h2 class="title">User Login</h2>

      <form class="login-form">
        <input
          type="text"
          name="username"
          id="username"
          placeholder="Username"
        />
        <p class="error" id="userError"></p>

        <input
          type="password"
          name="password"
          id="password"
          placeholder="Password"
        />
        <p class="error" id="passError"></p>

        <button type="button" class="btn login-btn" onclick="loginNow()">
          Login
        </button>
      </form>
    </div>
    <button
      class="admin-floating-btn"
      onclick="window.location='../LOGINADMIN/ADMINLOGIN.html'"
    >
      Admin Login
    </button>
    <script>
      function loginNow() {
        let username = document.getElementById("username");
        let password = document.getElementById("password");

        let userError = document.getElementById("userError");
        let passError = document.getElementById("passError");

        let valid = true;

        // Reset previous styles
        username.classList.remove("error-border");
        password.classList.remove("error-border");
        userError.style.display = "none";
        passError.style.display = "none";

        // Check username
        if (username.value.trim() === "") {
          username.classList.add("error-border");
          userError.innerText = "Please enter your username";
          userError.style.display = "block";
          valid = false;
        }

        // Check password
        if (password.value.trim() === "") {
          password.classList.add("error-border");
          passError.innerText = "Please enter your password";
          passError.style.display = "block";
          valid = false;
        }

        // If all fields are filled → redirect
        if (valid) {
          window.location.href =
            "../../CUSTOMERSELECTIONPAGE/CUSTOMERSELECTIONPAGE.html";
        }
      }
    </script>
  </body>
</html>
