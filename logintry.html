<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>User Login</title>

    <style>
      /* RESET */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      /* BACKGROUND WITH ANIMATION */
      body {
        height: 100vh;
        overflow: hidden;
      }

      .background {
        position: fixed;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #fcba03, #03fcb6, #fc03ba);
        background-size: 300% 300%;
        animation: bgMove 10s infinite alternate ease-in-out;
        filter: blur(3px);
        z-index: 0;
      }

      @keyframes bgMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* LOGIN CARD (GLASS EFFECT) */
      .login-card {
        position: absolute;
        z-index: 1;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 380px;
        padding: 80px 45px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        backdrop-filter: blur(10px);
        border: 1px solid white;
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.2);
        animation: slideDown 0.8s ease forwards;
        opacity: 0;
      }
      .login-card:hover {
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.2);
        transition: all 0.5s;
      }

      /* SLIDE-IN ANIMATION */
      @keyframes slideDown {
        0% {
          transform: translate(-50%, -60%);
          opacity: 0;
        }
        100% {
          transform: translate(-50%, -50%);
          opacity: 1;
        }
      }

      .title {
        text-align: center;
        color: #fff;
        font-size: 28px;
        margin-bottom: 20px;
        font-weight: 600;
      }

      /* INPUT ANIMATION */
      input {
        width: 100%;
        padding: 12px 15px;
        margin: 10px 0;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(255, 255, 255, 0.85);
        font-size: 15px;
        transition: 0.3s;
      }

      input:focus {
        transform: scale(1.03);
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.25);
      }

      /* BUTTONS */
      .btn {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        margin-top: 12px;
        transition: 0.4s ease;
        font-weight: 600;
      }

      /* USER LOGIN BUTTON */
      .login-btn {
        background: #ffffff;
        color: #5f7099;
      }

      .login-btn:hover {
        background: #5f7099;
        color: white;
        transform: translateY(-3px);
      }

      /* ADMIN BUTTON */
      .admin-btn {
        background: #ff006e;
        color: white;
      }

      .admin-btn:hover {
        background: #c20054;
        transform: translateY(-3px);
      }

      /* MOBILE RESPONSIVE DESIGN */
      @media (max-width: 480px) {
        .login-card {
          width: 90%;
          padding: 25px;
        }

        .title {
          font-size: 24px;
        }

        input {
          font-size: 14px;
        }

        .btn {
          font-size: 15px;
        }
      }

      /* TABLET RESPONSIVE */
      @media (max-width: 768px) {
        .login-card {
          width: 70%;
        }
      }
      .error {
        color: red;
        font-size: 13px;
        margin-top: -5px;
        margin-bottom: 5px;
        display: none;
      }

      input.error-border {
        border: 2px solid red !important;
      }
      /* FLOATING ADMIN BUTTON (BOTTOM RIGHT) */
      .admin-floating-btn {
        position: fixed;
        bottom: 25px;
        right: 25px;
        background: #ff006e;
        color: white;
        padding: 12px 22px;
        border: none;
        border-radius: 50px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.25);
        transition: 0.3s ease;
        z-index: 999;
      }

      /* Hover effect */
      .admin-floating-btn:hover {
        background: #c20054;
        transform: translateY(-3px);
      }

      /* MOBILE RESPONSIVE */
      @media (max-width: 480px) {
        .admin-floating-btn {
          bottom: 15px;
          right: 15px;
          padding: 10px 18px;
          font-size: 14px;
        }
      }
      /* INVALID LOGIN MESSAGE STYLING */
      .invalid-msg {
        margin-top: 15px; /* move it slightly down */
        font-weight: 700; /* bold */
        font-size: 14px; /* increase 2px from default 15px input text */
      }
      #bgVideo {
        position: fixed;
        top: 0;
        left: 0;
        min-width: 100%;
        min-height: 100%;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        object-fit: cover; /* fills the screen */
        filter: blur(0px) brightness(0.7); /* optional: blur + darken */
      }

      .company-brand {
        position: absolute;
        top: 60px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 42px;
        font-weight: 600;
        letter-spacing: 4px;
        text-transform: uppercase;

        color: rgba(255, 255, 255, 0.92);

        text-shadow:
          0 0 10px rgba(255, 255, 255, 0.25),
          0 0 25px rgba(180, 210, 255, 0.25),
          0 0 45px rgba(120, 170, 255, 0.25);

        animation:
          brandFloat 6s ease-in-out infinite,
          brandGlow 4s ease-in-out infinite;

        z-index: 5;
        pointer-events: none;
      }

      /* smooth floating (merge with video motion) */
      @keyframes brandFloat {
        0% {
          transform: translate(-50%, 0);
        }
        50% {
          transform: translate(-50%, -12px);
        }
        100% {
          transform: translate(-50%, 0);
        }
      }

      /* soft glowing loop */
      @keyframes brandGlow {
        0% {
          text-shadow:
            0 0 10px rgba(255, 255, 255, 0.25),
            0 0 25px rgba(180, 210, 255, 0.25),
            0 0 45px rgba(120, 170, 255, 0.25);
        }
        50% {
          text-shadow:
            0 0 15px rgba(255, 255, 255, 0.45),
            0 0 35px rgba(180, 210, 255, 0.45),
            0 0 60px rgba(120, 170, 255, 0.45);
        }
        100% {
          text-shadow:
            0 0 10px rgba(255, 255, 255, 0.25),
            0 0 25px rgba(180, 210, 255, 0.25),
            0 0 45px rgba(120, 170, 255, 0.25);
        }
      }
      .robot-3d {
        position: absolute;
        right: -130px;
        bottom: 40px; /* 👈 above your Admin Login button */
        transform: scale(0.30);
        transform-origin: bottom right;
        z-index: 100;
        pointer-events: none; /* so button is still clickable */
      }
    </style>
  </head>

  <body>
    <video id="bgVideo" autoplay muted playsinline>
      <source src="" type="video/mp4" />
      Your browser does not support HTML5 video.
    </video>
    <div class="company-brand">SAFARIO COOLING FACTORY</div>

    <div class="login-card">
      <h2 class="title">User Login</h2>

      <form>
        <input
          type="text"
          name="username"
          id="username"
          placeholder="Username"
        />

        <input
          type="password"
          name="password"
          id="password"
          placeholder="Password"
        />

        <button type="submit" class="btn login-btn">Login</button>
      </form>
    </div>
    <spline-viewer
      class="robot-3d"
      url="https://prod.spline.design/ZHViA3aLexh-SdN4/scene.splinecode"
    ></spline-viewer>

    <button
      class="admin-floating-btn"
      onclick="
        window.location = '<%= request.getContextPath() %>/login/loginAdmin.jsp'
      "
    >
      Admin Login
    </button>
    <script
      type="module"
      src="https://unpkg.com/@splinetool/viewer@1.12.46/build/spline-viewer.js"
    ></script>

    <script>
      function validateForm() {
        let username = document.getElementById("username");
        let password = document.getElementById("password");

        let userError = document.getElementById("userError");
        let passError = document.getElementById("passError");

        let valid = true;

        username.classList.remove("error-border");
        password.classList.remove("error-border");

        userError.style.display = "none";
        passError.style.display = "none";

        if (username.value.trim() === "") {
          userError.innerText = "Please enter your username";
          userError.style.display = "block";
          username.classList.add("error-border");
          valid = false;
        }

        if (password.value.trim() === "") {
          passError.innerText = "Please enter your password";
          passError.style.display = "block";
          password.classList.add("error-border");
          valid = false;
        }

        return valid; // true → submit to servlet
      }
      const video = document.getElementById("bgVideo");

      // Ensure the video loops even on iOS/Android
      video.addEventListener("ended", () => {
        video.currentTime = 0; // Reset to start
        video.play(); // Play again
      });

      // Extra safety: play immediately if paused (mobile quirks)
      video.play().catch(() => {
        console.log("Autoplay blocked, user interaction may be needed.");
      });
    </script>
  </body>
</html>
